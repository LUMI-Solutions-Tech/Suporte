<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lumi Solutions</title>
    <script src="./js/sessao.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilosCSS/login.css">
    <link rel="stylesheet" href="estilosCSS/cabecalho.css">
</head>
<body>
    <header id="home">
        <div class="cabecalho-menu">
            <div class="logo-container">
                <img src="./imagens/logo.svg" alt="Logo Lumi Solutions" class="img-logo">
                <p class="nome-logo">Lumi Solutions Tech</p>
            </div>
            <div class="menu">
                <a href="suporte.html">Suporte</a>
            </div>
        </div>
    </header>
    <section>
        <div class="container-cadastro">
            <img src="./imagens/suporte_alface.png" alt="Service Desk de alface" class="img-login">
            <div class="inputsCadastro">
                <div class="topo-login">
                    <p class="boasvindas-text">Bem vindo ao <strong>LUMI</strong></p>
                    <div class="toggle-botoes">
                    </div>
                </div>
                <h2 class="title-cadastro">Login</h2>
                <p class="text-cadastro">Faça o login com sua conta de Suporte</p>
                <div class="cadastro-email">
                    <div class="grupo-input">
                        <input type="text" id="ipt_email" class="ipt_cadastro" placeholder="">
                        <label>Email</label>
                    </div>
                </div>
                <div class="grupo-input">
                    <input type="password" id="ipt_senha" class="ipt_cadastroSenha" placeholder="">
                    <label>Senha</label>
                </div>
                <button onclick="entrar()" class="btn-login">Login</button>
                <br><br>
                <div class="alerta_erro">
                    <div class="card_erro" id="cardErro">
                        <span id="mensagem_erro"></span>
                    </div>
                </div>
                <div id="div_erros_login"></div>
            </div>
        </div>
    </section>
</body>
</html>

<script>
    let tentativas = 3;

    function entrar() {
        aguardar();
        let emailVar = ipt_email.value.trim();
        let senhaVar = ipt_senha.value.trim();
        let erros = '';

        if (emailVar == '') {
            erros += `Informe o seu e-mail / `;
        } else if (!emailVar.includes('@')) {
            erros += `Insira um e-mail válido / `;
        }

        if (senhaVar == '') {
            erros += `Informe sua senha / `;
        }

        if (erros != '') {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = erros;
            finalizarAguardar();
            setInterval(sumirMensagem, 5000);
            return false;
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        })
        .then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!");
            if (resposta.ok) {
                console.log(resposta);
                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.idUsuario;
                    sessionStorage.FK_EMPRESA = json.fkUsuarioEmpresa;
                    alert(`Login efetuado com sucesso!`);
                    setTimeout(function () {
                        window.location = "./dashboard/dashboard.html";
                    }, 1000);
                });
            } else {
                tentativas--;
                if (tentativas > 0) {
                    cardErro.style.display = "block";
                    mensagem_erro.innerHTML = `Erro no login, email ou senha incorretos, restam ${tentativas} tentativa(s)`;
                } else {
                    cardErro.style.display = "block";
                    mensagem_erro.innerHTML = `Usuário bloqueado!`;
                }
                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }
        })
        .catch(function (erro) {
            console.log(erro);
        });

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none";
    }
</script>
